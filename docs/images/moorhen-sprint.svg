          values="10 6;15 9;10 6;15 9;10 6"/>
        <g>
          <animateTransform attributeName="transform" type="rotate" dur="600ms" repeatCount="indefinite" calcMode="linear"
            keyTimes="0;0.225;0.5;0.725;1"
            values="12 330 190;17 330 190;12 330 190;17 330 190;12 330 190"/>
          <path d="M 319.6 139 C 314 146 309.5 160 306 176 C 314 178 323 173.5 331 167 C 339 160.5 342 152 342 146 C 335 140 326 138 319.6 139 Z" fill="#363B45"/>
