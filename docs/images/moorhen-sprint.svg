          values="-16 200 226;-22 200 226;-16 200 226;-22 200 226;-16 200 226"/>
        <path d="M192 240 C172 227 154 210 142 192 C138 185 145 180 151 185 C167 200 183 218 197 234 Z" fill="#FFFFFF"/>
        <path d="M194 248 C172 236 152 220 140 202 C136 195 143 189 149 194 C166 209 182 228 200 242 Z" fill="#252A32"/>
        <path d="M196 232 C172 214 150 190 138 162 C134 152 144 145 152 152 C172 172 192 200 206 224 Z" fill="#2A2F38"/>
        <path d="M206 230 C188 214 170 194 160 172 C157 164 165 159 171 165 C186 184 200 208 214 226 Z" fill="#31363F"/>
