        <circle cx="210" cy="348" r="7.5" fill="#A9C44F"/>
        <path d="M210 348 L224 426" stroke="#A9C44F" stroke-width="12" stroke-linecap="round" fill="none"/>
        <circle cx="224" cy="426" r="6" fill="#A9C44F"/>
        <g>
