          <path d="M 317.5 143 C 313 151 310 160 307.5 169" stroke="#464D5B" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>
          <path d="M346 170 C336 182 326 192 316 202" stroke="#363B45" stroke-width="30" stroke-linecap="round" fill="none"/>
          <ellipse cx="342" cy="177" rx="25" ry="20" fill="#363B45"/>
          <circle cx="344" cy="158" r="31" fill="#2B303A"/>
          <circle cx="344" cy="154" r="31" fill="#363B45" clip-path="url(#mh-head-clip)"/>
          <g clip-path="url(#mh-head-clip)">
            <circle cx="344" cy="158" r="31" fill="none" stroke="#464D5B" stroke-width="6" opacity="0.5" clip-path="url(#mh-headtop)"/>
          </g>
          <!-- the red frontal shield + yellow beak tip — unmistakably a moorhen -->
          <path d="M374 164 C375 148 370 136 358 128 C352 124 345 127 347 133 C351 144 353 154 354 164 Z" fill="#E8503C"/>
          <g>
            <path d="M372 144 C390 144 404 151 408 158 C404 166 390 172 372 172 C374 162 374 153 372 144 Z" fill="#E8503C"/>
            <rect x="395" y="138" width="18" height="40" fill="#FFC93C" clip-path="url(#mh-beak-clip)"/>
            <path d="M374 159 Q390 163 405 158" stroke="#C23A28" stroke-width="2.5" stroke-linecap="round" fill="none" clip-path="url(#mh-beak-clip)"/>
            <circle cx="382" cy="152" r="1.6" fill="#1A1D22" opacity="0.4"/>
          </g>
          <g>
            <circle cx="341" cy="152" r="7" fill="#A83B30"/>
            <circle cx="341.5" cy="152" r="3.2" fill="#1E2126"/>
            <circle cx="339" cy="149.5" r="1.6" fill="#FFFFFF" opacity="0.9"/>
          </g>
          <circle cx="341" cy="152" r="8.5" fill="#363B45" opacity="0">
            <animate attributeName="opacity" dur="7.5s" repeatCount="indefinite" calcMode="linear"
