          <path d="M224 426 L268 448 L290 458" stroke="#A9C44F" stroke-width="8.5" stroke-linecap="round" fill="none"/>
          <path d="M290 458 L299 462" stroke="#6E7F33" stroke-width="3.2" stroke-linecap="round" fill="none"/>
          <path d="M224 426 L250 452 L262 470" stroke="#A9C44F" stroke-width="8.5" stroke-linecap="round" fill="none"/>
          <path d="M262 470 L267 480" stroke="#6E7F33" stroke-width="3.2" stroke-linecap="round" fill="none"/>
          <path d="M224 426 L198 442 L182 448" stroke="#A9C44F" stroke-width="8" stroke-linecap="round" fill="none"/>
          <path d="M182 448 L173 451" stroke="#6E7F33" stroke-width="3" stroke-linecap="round" fill="none"/>
        </g>
