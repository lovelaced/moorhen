          values="4 242 346;4 242 346;8 242 346;12 242 346;-64 242 346;-4 242 346;4 242 346"/>
        <circle cx="242" cy="346" r="7" fill="#8CA53F"/>
        <path d="M242 346 L256 424" stroke="#8CA53F" stroke-width="11" stroke-linecap="round" fill="none"/>
        <circle cx="256" cy="424" r="5.5" fill="#8CA53F"/>
        <g>
          <animateTransform attributeName="transform" type="rotate" dur="600ms" begin="-300ms" repeatCount="indefinite" calcMode="linear"
            keyTimes="0;0.08;0.16;0.24;0.32;0.44;0.58;0.8;1"
            values="36 256 424;10 256 424;-5 256 424;-14 256 424;26 256 424;58 256 424;195 256 424;60 256 424;36 256 424"/>
          <path d="M256 424 L318 438 L342 443" stroke="#8CA53F" stroke-width="8" stroke-linecap="round" fill="none"/>
          <path d="M342 443 L352 445" stroke="#5E6E2C" stroke-width="3" stroke-linecap="round" fill="none"/>
          <path d="M256 424 L300 446 L322 455" stroke="#8CA53F" stroke-width="8" stroke-linecap="round" fill="none"/>
          <path d="M322 455 L331 459" stroke="#5E6E2C" stroke-width="3" stroke-linecap="round" fill="none"/>
          <path d="M256 424 L282 450 L294 466" stroke="#8CA53F" stroke-width="8" stroke-linecap="round" fill="none"/>
          <path d="M294 466 L299 475" stroke="#5E6E2C" stroke-width="3" stroke-linecap="round" fill="none"/>
