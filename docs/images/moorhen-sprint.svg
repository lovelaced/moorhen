        <path d="M336 226 C352 246 352 276 334 294 C326 302 316 308 304 312 C300 322 290 323 286 316 C280 324 268 324 264 317 C258 324 246 323 242 316 C236 322 224 320 220 312 C214 318 204 314 200 305 C194 312 186 305 184 294 C166 278 156 244 168 220 C182 196 214 182 250 182 C286 182 320 200 336 226 Z" transform="translate(0 -6)" fill="#363B45" clip-path="url(#mh-body-clip)"/>
        <ellipse cx="250" cy="290" rx="78" ry="24" fill="#414957" clip-path="url(#mh-body-clip)"/>
        <ellipse cx="248" cy="308" rx="66" ry="14" fill="#262B34" opacity="0.45" clip-path="url(#mh-body-clip)"/>
        <g clip-path="url(#mh-body-clip)">
          <path d="M336 226 C352 246 352 276 334 294 C326 302 316 308 304 312 C300 322 290 323 286 316 C280 324 268 324 264 317 C258 324 246 323 242 316 C236 322 224 320 220 312 C214 318 204 314 200 305 C194 312 186 305 184 294 C166 278 156 244 168 220 C182 196 214 182 250 182 C286 182 320 200 336 226 Z" fill="none" stroke="#464D5B" stroke-width="9" opacity="0.55" clip-path="url(#mh-tophalf)"/>
        </g>
        <g>
          <path d="M320 206 C332 226 330 250 310 268 C268 292 216 288 178 262 C166 254 154 240 148 232 L160 226 L146 218 C186 206 230 188 274 190 C296 191 308 197 320 206 Z" fill="#35342E"/>
          <path d="M320 206 C332 226 330 250 310 268 C268 292 216 288 178 262 C166 254 154 240 148 232 L160 226 L146 218 C186 206 230 188 274 190 C296 191 308 197 320 206 Z" transform="translate(0 -5)" fill="#43423A" clip-path="url(#mh-wing-clip)"/>
          <g clip-path="url(#mh-wing-clip)">
            <path d="M320 206 C332 226 330 250 310 268 C268 292 216 288 178 262 C166 254 154 240 148 232 L160 226 L146 218 C186 206 230 188 274 190 C296 191 308 197 320 206 Z" fill="none" stroke="#565448" stroke-width="7" opacity="0.5" clip-path="url(#mh-tophalf)"/>
          </g>
          <path d="M230 268 C258 274 288 268 306 252 M206 258 C232 266 262 262 282 250" stroke="#2C2B26" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.55"/>
          <path d="M158 236 C178 254 204 266 232 272 M152 224 C170 236 190 246 210 252" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.8"/>
        </g>
        <path d="M214 272 L232 284 M240 278 L258 288 M266 280 L284 288 M292 276 L308 282" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" fill="none" opacity="0.95"/>
      </g>

      <g>
        <path d="M 270.0 183.8 C 292 188 303 174 315 168.5 C 328 163 343 162.5 351 167 C 359 171.5 363 181 363 192 C 363 206 356 219 351 228 C 348.2 236 343.1 239.7 345.7 245.0 C 330 240 300 212 270.0 183.8 Z" fill="#363B45"/>
        <path d="M 286 184 C 298 186 306 178 316 171" stroke="#464D5B" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.5"/>
      </g>

      <g>
        <animateTransform attributeName="transform" type="translate" dur="600ms" repeatCount="indefinite" calcMode="linear"
