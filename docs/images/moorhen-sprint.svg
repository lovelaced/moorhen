<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 118 464 388" width="464" height="388" role="img" aria-label="Moorhen mascot sprinting">
  <!-- The sprinting moorhen from the app's loader (moorhen-loader.tsx), as a
       standalone SMIL-animated SVG. Same rig: one 600 ms stride drives the
       thigh→shin→foot chains (far leg half a stride out of phase via a
       negative begin), the body carries the sprint crouch, the head pumps
       twice per stride, and the eye double-blinks on its own slow clock. -->
  <defs>
    <clipPath id="mh-body-clip"><path d="M336 226 C352 246 352 276 334 294 C326 302 316 308 304 312 C300 322 290 323 286 316 C280 324 268 324 264 317 C258 324 246 323 242 316 C236 322 224 320 220 312 C214 318 204 314 200 305 C194 312 186 305 184 294 C166 278 156 244 168 220 C182 196 214 182 250 182 C286 182 320 200 336 226 Z"/></clipPath>
    <clipPath id="mh-tophalf"><rect x="0" y="0" width="512" height="262"/></clipPath>
    <clipPath id="mh-headtop"><rect x="0" y="0" width="512" height="158"/></clipPath>
    <clipPath id="mh-head-clip"><circle cx="344" cy="158" r="31"/></clipPath>
    <clipPath id="mh-wing-clip"><path d="M320 206 C332 226 330 250 310 268 C268 292 216 288 178 262 C166 254 154 240 148 232 L160 226 L146 218 C186 206 230 188 274 190 C296 191 308 197 320 206 Z"/></clipPath>
    <clipPath id="mh-beak-clip"><path d="M372 144 C390 144 404 151 408 158 C404 166 390 172 372 172 C374 162 374 153 372 144 Z"/></clipPath>
  </defs>

  <!-- warm cream brand card so the dark bird reads on any GitHub theme -->
  <rect x="4" y="122" width="456" height="380" rx="28" fill="#F5F4F1"/>

  <ellipse cx="256" cy="454" rx="132" ry="19" fill="#1A1D22" opacity="0.1"/>

  <g>
    <animateTransform attributeName="transform" type="translate" dur="600ms" repeatCount="indefinite" calcMode="linear"
      keyTimes="0;0.08;0.26;0.44;0.5;0.58;0.76;0.94;1"
      values="0 -3;0 -6;0 -8;0 -15;0 -3;0 -6;0 -8;0 -15;0 -3"/>

    <!-- far leg: half a stride out of phase, sits behind -->
    <g>
      <animateTransform attributeName="transform" type="rotate" dur="600ms" begin="-300ms" repeatCount="indefinite" calcMode="linear"
        keyTimes="0;0.16;0.28;0.44;0.58;0.8;1"
        values="-30 254 294;2 254 294;40 254 294;70 254 294;6 254 294;-52 254 294;-30 254 294"/>
      <path d="M254 294 L242 346" stroke="#8CA53F" stroke-width="14" stroke-linecap="round" fill="none"/>
      <rect x="241" y="314" width="17" height="10" rx="5" fill="#C93A2E"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" dur="600ms" begin="-300ms" repeatCount="indefinite" calcMode="linear"
